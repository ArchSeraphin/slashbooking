name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2
      - name: Validate composer.json
        run: composer validate --strict
      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
      - name: Install
        run: composer install --no-progress --prefer-dist
      - name: PHPUnit (unit)
        run: composer test
      - name: PHPStan
        run: composer stan
      - name: PHPCS
        run: composer cs

  frontend:
    name: Frontend build & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install
        run: npm ci
      - name: Lint JS
        run: npm run lint:js
      - name: Build
        run: npm run build
      - name: Upload bundle
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: assets/dist/
